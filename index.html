<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acoustic Space</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Outfit', sans-serif;
    background: #121212;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 32px 24px 80px;
    display: flex;
    justify-content: center;
  }

  .app { max-width: 560px; width: 100%; }

  /* Header */
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
  .header h1 { font-weight: 700; font-size: 20px; letter-spacing: -0.3px; color: #fff; margin-bottom: 2px; }
  .header .sub { font-family: 'DM Mono', monospace; font-size: 11px; color: #686868; }
  .lang-group { display: flex; gap: 4px; }
  .lang-btn {
    cursor: pointer; padding: 5px 12px; border-radius: 14px;
    border: 1px solid #333; background: transparent;
    color: #777; font-family: 'DM Mono', monospace; font-size: 11px;
    font-weight: 500; transition: all .15s;
  }
  .lang-btn.active { color: #fff; background: #1DB954; border-color: #1DB954; }
  .lang-btn:hover:not(.active) { border-color: #555; color: #aaa; }

  /* Prompt */
  .prompt-box {
    font-family: 'Outfit', sans-serif; font-size: 19px; font-weight: 500;
    line-height: 1.7; color: #fff; padding: 22px 24px;
    background: #1a1a1a; border: 1px solid #333; border-radius: 10px;
    min-height: 68px; letter-spacing: .1px;
  }
  .prompt-actions { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }

  .btn {
    cursor: pointer; padding: 8px 20px; border-radius: 20px;
    border: 1px solid #333; background: #1a1a1a;
    color: #b0b0b0; font-family: 'DM Mono', monospace; font-size: 11px;
    letter-spacing: .4px; text-transform: uppercase; transition: all .15s;
  }
  .btn:hover { border-color: #555; color: #e0e0e0; background: #252525; }
  .btn.success { color: #1DB954; border-color: #1DB954; }

  /* Options */
  .options-section {
    margin-bottom: 20px;
    padding: 14px 18px;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
  }

  .check-row {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    user-select: none;
  }

  .check-row input {
    accent-color: #1DB954;
    width: 16px;
    height: 16px;
    cursor: pointer;
  }

  .check-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: #b0b0b0;
    letter-spacing: .4px;
    text-transform: uppercase;
  }

  /* Genre */
  .genre-section,
  .subgenre-section {
    position: relative;
    margin-bottom: 20px;
  }

  .subgenre-section {
    display: none;
  }

  .subgenre-section.visible {
    display: block;
    animation: fadeUp .15s ease;
  }

  .section-label {
    font-family: 'DM Mono', monospace; font-size: 11px; color: #a0a0a0;
    text-transform: uppercase; letter-spacing: 1.5px; display: block; margin-bottom: 6px;
  }

  .genre-trigger,
  .select-control {
    cursor: pointer; padding: 12px 18px; background: #1a1a1a;
    border: 1px solid #333; border-radius: 8px;
    display: flex; justify-content: space-between; align-items: center;
    width: 100%; color: #e0e0e0; font-family: 'DM Mono', monospace; font-size: 14px;
    transition: all .15s;
  }

  .genre-trigger:hover,
  .select-control:hover {
    border-color: #555;
  }

  .genre-trigger .arrow { color: #686868; font-size: 10px; }

  .select-control {
    appearance: none;
    -webkit-appearance: none;
    outline: none;
  }

  .genre-drop {
    position: absolute; left: 0; right: 0; top: calc(100% + 4px);
    background: #242424; border: 1px solid #444; border-radius: 8px;
    max-height: 300px; overflow-y: auto; z-index: 50;
    box-shadow: 0 12px 48px rgba(0,0,0,.6);
    display: none;
  }
  .genre-drop.open { display: block; animation: fadeUp .15s ease; }
  .genre-drop::-webkit-scrollbar { width: 6px; }
  .genre-drop::-webkit-scrollbar-track { background: #242424; border-radius: 0 8px 8px 0; }
  .genre-drop::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }

  .genre-input {
    width: 100%; padding: 12px 16px; background: #1a1a1a;
    border: none; border-bottom: 1px solid #333;
    color: #e0e0e0; font-family: 'DM Mono', monospace; font-size: 13px;
    outline: none; position: sticky; top: 0;
  }
  .genre-input::placeholder { color: #666; }

  .genre-opt {
    padding: 10px 16px; cursor: pointer; font-family: 'DM Mono', monospace;
    font-size: 13px; color: #b0b0b0; transition: all .1s;
    border-bottom: 1px solid #2a2a2a;
  }
  .genre-opt:hover { background: #2e2e2e; color: #fff; }
  .genre-opt.active { color: #1DB954; background: #2a2a2a; }

  /* Axis */
  .axis { margin-bottom: 28px; }
  .axis-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .axis-name {
    font-family: 'DM Mono', monospace; font-size: 11px; color: #a0a0a0;
    text-transform: uppercase; letter-spacing: 1.5px;
  }
  .axis-word {
    font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500;
    letter-spacing: .3px; transition: color .15s;
  }
  .axis-ends {
    display: flex; justify-content: space-between;
    font-family: 'DM Mono', monospace; font-size: 10px; color: #686868; margin-top: 3px;
  }

  /* Range sliders */
  input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 24px; background: transparent;
    cursor: pointer; outline: none;
  }
  input[type=range]::-webkit-slider-runnable-track {
    height: 6px; border-radius: 3px; background: transparent;
  }
  input[type=range]::-moz-range-track {
    height: 6px; border-radius: 3px; background: #404040; border: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; height: 20px; width: 20px;
    border-radius: 50%; border: none; margin-top: -7px;
    box-shadow: 0 1px 6px rgba(0,0,0,.5); transition: transform .1s;
  }
  input[type=range]::-moz-range-thumb {
    height: 20px; width: 20px; border-radius: 50%;
    border: none; box-shadow: 0 1px 6px rgba(0,0,0,.5);
  }
  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }
  input[type=range]:active::-webkit-slider-thumb { transform: scale(1.4); }

  input[type=range].sl-a::-webkit-slider-thumb { background: #E8764B; }
  input[type=range].sl-a::-moz-range-thumb { background: #E8764B; }
  input[type=range].sl-a::-moz-range-progress { background: #E8764B; border-radius: 3px; height: 6px; }

  input[type=range].sl-v::-webkit-slider-thumb { background: #5BA8E8; }
  input[type=range].sl-v::-moz-range-thumb { background: #5BA8E8; }
  input[type=range].sl-v::-moz-range-progress { background: #5BA8E8; border-radius: 3px; height: 6px; }

  input[type=range].sl-d::-webkit-slider-thumb { background: #C89BF2; }
  input[type=range].sl-d::-moz-range-thumb { background: #C89BF2; }
  input[type=range].sl-d::-moz-range-progress { background: #C89BF2; border-radius: 3px; height: 6px; }

  /* Coordinates */
  .coords {
    margin-top: 4px; padding: 14px 18px; background: #1a1a1a;
    border: 1px solid #2a2a2a; border-radius: 8px;
    display: flex; justify-content: center; gap: 28px;
    font-family: 'DM Mono', monospace; font-size: 12px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <div class="header">
    <div>
      <h1>Acoustic Space</h1>
      <p class="sub" id="subtitle">Three axes · One prompt</p>
    </div>
    <div class="lang-group">
      <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" id="btn-pt" onclick="setLang('pt')">PT</button>
    </div>
  </div>

  <!-- Prompt -->
  <div style="margin-bottom:28px">
    <div class="prompt-box" id="prompt-output"></div>
    <div class="prompt-actions">
      <button class="btn" id="random-btn" onclick="generateRandomPrompt()">random</button>
      <button class="btn" id="copy-btn" onclick="handleCopy()">copy</button>
    </div>
  </div>

  <!-- Genre Toggle -->
  <div class="options-section">
    <label class="check-row">
      <input type="checkbox" id="use-genre" checked onchange="toggleUseGenre()">
      <span class="check-label" id="use-genre-label">Use genre</span>
    </label>
  </div>

  <!-- Genre -->
  <div class="genre-section" id="genre-section">
    <span class="section-label" id="genre-label">Genre</span>
    <button class="genre-trigger" onclick="toggleGenre()">
      <span id="genre-display"></span>
      <span class="arrow" id="genre-arrow">▼</span>
    </button>
    <div class="genre-drop" id="genre-drop">
      <input class="genre-input" id="genre-search" placeholder="search..." oninput="filterGenres()">
      <div id="genre-list"></div>
    </div>
  </div>

  <!-- Subgenre -->
  <div class="subgenre-section visible" id="subgenre-section">
    <span class="section-label" id="subgenre-label">Subgenre</span>
    <select class="select-control" id="subgenre-select" onchange="update()"></select>
  </div>

  <!-- Arousal -->
  <div class="axis">
    <div class="axis-head">
      <span class="axis-name" id="label-a">Arousal</span>
      <span class="axis-word" id="word-a" style="color:#E8764B"></span>
    </div>
    <input type="range" class="sl-a" id="slider-a" min="0" max="6" step="1" value="3" oninput="update()">
    <div class="axis-ends">
      <span id="low-a">slow</span>
      <span id="high-a">intense</span>
    </div>
  </div>

  <!-- Valence -->
  <div class="axis">
    <div class="axis-head">
      <span class="axis-name" id="label-v">Valence</span>
      <span class="axis-word" id="word-v" style="color:#5BA8E8"></span>
    </div>
    <input type="range" class="sl-v" id="slider-v" min="0" max="6" step="1" value="3" oninput="update()">
    <div class="axis-ends">
      <span id="low-v">sad</span>
      <span id="high-v">euphoric</span>
    </div>
  </div>

  <!-- Depth -->
  <div class="axis">
    <div class="axis-head">
      <span class="axis-name" id="label-d">Depth</span>
      <span class="axis-word" id="word-d" style="color:#C89BF2"></span>
    </div>
    <input type="range" class="sl-d" id="slider-d" min="0" max="6" step="1" value="3" oninput="update()">
    <div class="axis-ends">
      <span id="low-d">simple</span>
      <span id="high-d">complex</span>
    </div>
  </div>

  <!-- Coords -->
  <div class="coords">
    <span><span style="color:#E8764B">A</span><span style="color:#555" id="coord-a">:4/7</span></span>
    <span><span style="color:#5BA8E8">V</span><span style="color:#555" id="coord-v">:4/7</span></span>
    <span><span style="color:#C89BF2">D</span><span style="color:#555" id="coord-d">:4/7</span></span>
  </div>
</div>

// ─── State ───
let lang = "en";
let genreIdx = GENRES.findIndex(g => g[0] === "Electronic");
let genreOpen = false;
let useGenre = true;

// ─── Helpers ───
function getAxisWord(axis, idx, ln) {
  return ln === "pt" ? axis[idx][1] : axis[idx][0];
}

function getGenreKey(idx) {
  return GENRES[idx][0];
}

function getGenreName(idx, ln) {
  return ln === "pt" ? GENRES[idx][1] : GENRES[idx][0];
}

function getSubgenreName(subgenre, ln) {
  return ln === "pt" ? subgenre[1] : subgenre[0];
}

function getAxisEnd(axis, end, ln) {
  const idx = end === "low" ? 0 : axis.length - 1;
  return getAxisWord(axis, idx, ln);
}

function getSelectedSubgenre() {
  const select = document.getElementById("subgenre-select");
  if (!select || select.value === "") return null;

  const genreKey = getGenreKey(genreIdx);
  const subgenres = SUBGENRES[genreKey] || [];
  return subgenres.find(s => s[0] === select.value) || null;
}

function getStyleName(ln) {
  const selectedSubgenre = getSelectedSubgenre();

  if (selectedSubgenre) {
    return getSubgenreName(selectedSubgenre, ln);
  }

  return getGenreName(genreIdx, ln);
}

function randomInt(max) {
  return Math.floor(Math.random() * max);
}

// ─── Slider fill ───
function updateSliderFill(slider, color) {
  const pct = ((slider.value - slider.min) / (slider.max - slider.min)) * 100;
  slider.style.background =
    `linear-gradient(to right, ${color} 0%, ${color} ${pct}%, #404040 ${pct}%, #404040 100%)`;
}

// ─── Random prompt ───
function generateRandomPrompt() {
  document.getElementById("slider-a").value = randomInt(AROUSAL.length);
  document.getElementById("slider-v").value = randomInt(VALENCE.length);
  document.getElementById("slider-d").value = randomInt(DEPTH.length);

  const includeGenre = randomInt(GENRES.length + 1) !== 0;
  document.getElementById("use-genre").checked = includeGenre;

  if (includeGenre) {
    genreIdx = randomInt(GENRES.length);
    renderSubgenreSelect();

    const genreKey = getGenreKey(genreIdx);
    const subgenres = SUBGENRES[genreKey] || [];
    const subgenreSelect = document.getElementById("subgenre-select");
    const subgenreIdx = randomInt(subgenres.length + 1);

    subgenreSelect.value = subgenreIdx === 0 ? "" : subgenres[subgenreIdx - 1][0];
  }

  toggleUseGenre();
  return document.getElementById("prompt-output").textContent;
}

// ─── Prompt ───
function buildPrompt({ valence, arousal, depth, style, ln, includeGenre }) {
  if (ln === "pt") {
    if (!includeGenre) {
      return `Vamos de um mix com clima ${valence}, energia ${arousal} e produção ${depth}.`;
    }

    return `Vamos de um mix de ${style} com clima ${valence}, energia ${arousal} e produção ${depth}.`;
  }

  if (!includeGenre) {
    return `Let's go for a mix that feels ${valence}, sounds ${arousal}, and has ${depth} production.`;
  }

  return `Let's go for a ${style} mix that feels ${valence}, sounds ${arousal}, and has ${depth} production.`;
}

// ─── Core update ───
function update() {
  const a = +document.getElementById("slider-a").value;
  const v = +document.getElementById("slider-v").value;
  const d = +document.getElementById("slider-d").value;

  const aW = getAxisWord(AROUSAL, a, lang);
  const vW = getAxisWord(VALENCE, v, lang);
  const dW = getAxisWord(DEPTH, d, lang);
  const styleW = getStyleName(lang);

  document.getElementById("word-a").textContent = aW;
  document.getElementById("word-v").textContent = vW;
  document.getElementById("word-d").textContent = dW;

  const prompt = buildPrompt({
    valence: vW,
    arousal: aW,
    depth: dW,
    style: styleW,
    ln: lang,
    includeGenre: useGenre,
  });

  document.getElementById("prompt-output").textContent = prompt;

  document.getElementById("coord-a").textContent = ":" + (a + 1) + "/7";
  document.getElementById("coord-v").textContent = ":" + (v + 1) + "/7";
  document.getElementById("coord-d").textContent = ":" + (d + 1) + "/7";

  document.getElementById("genre-display").textContent = getGenreName(genreIdx, lang);

  updateSliderFill(document.getElementById("slider-a"), "#E8764B");
  updateSliderFill(document.getElementById("slider-v"), "#5BA8E8");
  updateSliderFill(document.getElementById("slider-d"), "#C89BF2");
}

// ─── Use genre toggle ───
function toggleUseGenre() {
  useGenre = document.getElementById("use-genre").checked;

  const genreSection = document.getElementById("genre-section");
  const subgenreSection = document.getElementById("subgenre-section");

  genreSection.style.display = useGenre ? "block" : "none";
  subgenreSection.className = useGenre ? "subgenre-section visible" : "subgenre-section";

  if (!useGenre && genreOpen) {
    genreOpen = false;
    document.getElementById("genre-drop").classList.remove("open");
    document.getElementById("genre-arrow").textContent = "▼";
  }

  update();
}

// ─── Language ───
function setLang(l) {
  lang = l;

  document.documentElement.lang = l === "pt" ? "pt-BR" : "en";

  document.getElementById("btn-en").className = "lang-btn" + (l === "en" ? " active" : "");
  document.getElementById("btn-pt").className = "lang-btn" + (l === "pt" ? " active" : "");

  document.getElementById("subtitle").textContent =
    l === "en" ? "Three axes · One prompt" : "Três eixos · Um prompt";

  document.getElementById("copy-btn").textContent =
    l === "en" ? "copy" : "copiar";

  document.getElementById("random-btn").textContent =
    l === "en" ? "random" : "aleatório";

  document.getElementById("use-genre-label").textContent =
    l === "en" ? "Use genre" : "Usar gênero";

  document.getElementById("genre-label").textContent =
    l === "en" ? "Genre" : "Gênero";

  document.getElementById("subgenre-label").textContent =
    l === "en" ? "Subgenre" : "Subgênero";

  document.getElementById("genre-search").placeholder =
    l === "en" ? "search..." : "buscar...";

  document.getElementById("label-a").textContent =
    l === "en" ? "Arousal" : "Excitação";

  document.getElementById("label-v").textContent =
    l === "en" ? "Valence" : "Valência";

  document.getElementById("label-d").textContent =
    l === "en" ? "Depth" : "Profundidade";

  document.getElementById("low-a").textContent = getAxisEnd(AROUSAL, "low", l);
  document.getElementById("high-a").textContent = getAxisEnd(AROUSAL, "high", l);

  document.getElementById("low-v").textContent = getAxisEnd(VALENCE, "low", l);
  document.getElementById("high-v").textContent = getAxisEnd(VALENCE, "high", l);

  document.getElementById("low-d").textContent = getAxisEnd(DEPTH, "low", l);
  document.getElementById("high-d").textContent = getAxisEnd(DEPTH, "high", l);

  renderGenreList();
  renderSubgenreSelect();
  update();
}

// ─── Genre dropdown ───
function toggleGenre() {
  if (!useGenre) return;

  genreOpen = !genreOpen;
  const drop = document.getElementById("genre-drop");
  const arrow = document.getElementById("genre-arrow");

  if (genreOpen) {
    drop.classList.add("open");
    arrow.textContent = "▲";
    document.getElementById("genre-search").value = "";
    renderGenreList();
    setTimeout(() => document.getElementById("genre-search").focus(), 50);
  } else {
    drop.classList.remove("open");
    arrow.textContent = "▼";
  }
}

function selectGenre(idx) {
  genreIdx = idx;
  genreOpen = false;

  document.getElementById("genre-drop").classList.remove("open");
  document.getElementById("genre-arrow").textContent = "▼";

  renderSubgenreSelect();
  update();
}

function filterGenres() {
  renderGenreList();
}

function renderGenreList() {
  const q = document.getElementById("genre-search").value.toLowerCase();
  const container = document.getElementById("genre-list");
  container.innerHTML = "";

  let count = 0;

  GENRES.forEach((g, i) => {
    if (
      q &&
      !g[0].toLowerCase().includes(q) &&
      !g[1].toLowerCase().includes(q)
    ) {
      return;
    }

    const div = document.createElement("div");
    div.className = "genre-opt" + (i === genreIdx ? " active" : "");
    div.textContent = getGenreName(i, lang);
    div.onclick = () => selectGenre(i);

    container.appendChild(div);
    count++;
  });

  if (count === 0) {
    const div = document.createElement("div");
    div.style.cssText = "padding:16px;color:#555;font-family:'DM Mono',monospace;font-size:12px;text-align:center";
    div.textContent = "—";
    container.appendChild(div);
  }
}

// ─── Subgenre select ───
function renderSubgenreSelect() {
  const select = document.getElementById("subgenre-select");
  const genreKey = getGenreKey(genreIdx);
  const subgenres = SUBGENRES[genreKey] || [];

  select.innerHTML = "";

  const emptyOption = document.createElement("option");
  emptyOption.value = "";
  emptyOption.textContent = lang === "en" ? "Any subgenre" : "Qualquer subgênero";
  select.appendChild(emptyOption);

  subgenres.forEach(subgenre => {
    const option = document.createElement("option");
    option.value = subgenre[0];
    option.textContent = getSubgenreName(subgenre, lang);
    select.appendChild(option);
  });
}

// ─── Copy ───
function handleCopy() {
  const text = document.getElementById("prompt-output").textContent;
  const btn = document.getElementById("copy-btn");

  try {
    navigator.clipboard.writeText(text).then(() => {
      showCopySuccess(btn);
    });
  } catch {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.cssText = "position:fixed;opacity:0";
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    showCopySuccess(btn);
  }
}

function showCopySuccess(btn) {
  btn.textContent = "✓";
  btn.classList.add("success");

  setTimeout(() => {
    btn.textContent = lang === "en" ? "copy" : "copiar";
    btn.classList.remove("success");
  }, 1400);
}

// ─── Close genre on outside click ───
document.addEventListener("click", (e) => {
  if (genreOpen && !e.target.closest(".genre-section")) {
    genreOpen = false;
    document.getElementById("genre-drop").classList.remove("open");
    document.getElementById("genre-arrow").textContent = "▼";
  }
});

// ─── Init ───
setLang("en");
toggleUseGenre();
</script>
